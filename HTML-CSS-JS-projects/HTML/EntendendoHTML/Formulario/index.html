<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="./Css/style.css">
</head>
<body>
    <form action="">
        <h1>Cadastro de Paciente</h1>

        <label for="nome"0>Digite seu nome:</label>
        <input type="text" name="nome do usuario" id="nome">

        <label for="CPF">Digite seu CPF</label>
        <input type="text" name="CPF" id="cpf">

        <label for="Endereço">Digite seu Endereço</label>
        <input type="text" name="Endereço" id="endereco">

        <label for="Telefone">Digite seu Telefone</label>
        <input type="tel" name="Telefone" id="telefone">

        <label for="Email">Digite seu Email</label>
        <input type="email" name="Email" id="email">

        <label for="Data">Data de Nascimento</label>
        <input type="date" name="Data de Nascimento" id="data">

        <label for="Login">Digite seu Login</label>
        <input type="text" name="Login" id="login">

        <label for="Senha">Digite sua Senha</label>
        <input type="text" name="Senha" id="senha">

        <button>Gravar</button>
        <button>Limpar</button>
    </form>
</body>
</html>
